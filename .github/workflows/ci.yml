name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --dev --extra mcp

    - name: Run ruff check
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run mypy
      run: uv run mypy .

    - name: Run tests
      # Single invocation across the whole tree. Per-file paths used to be
      # listed here individually (with ``continue-on-error`` workarounds for
      # "isolation issues") because the developer's local
      # ~/.config/srunx/config.json bled into model/render assertions. The
      # XDG isolation fixtures in tests/conftest.py make that obsolete; the
      # tests/X/test_Y.py layout (mirrors src/srunx/X/Y.py — see CLAUDE.md
      # "Test layout rules") makes per-file paths brittle to refactors. So
      # this step intentionally points at the whole tree and lets pytest
      # discover everything under the new structure.
      run: uv run pytest tests/ --cov=srunx --cov-report=xml --cov-report=term --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/srunx/web/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: src/srunx/web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      run: npx tsc --noEmit

    - name: Build frontend
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: npx playwright test --reporter=list
      env:
        CI: true

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: src/srunx/web/frontend/playwright-report/
        retention-days: 7
