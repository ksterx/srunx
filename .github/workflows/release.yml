name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      # Mirror ci.yml: ``--extra mcp`` is required because pytest collects
      # ``tests/mcp/`` and ``srunx.mcp.app`` calls ``sys.exit(1)`` on import
      # when the optional ``mcp`` package is missing.
      run: uv sync --dev --extra mcp

    - name: Run tests
      # Whole-tree discovery — per-file paths used to be listed here, but
      # they tied the workflow to a specific layout. The new tests/X/test_Y.py
      # structure (mirrors src/srunx/X/Y.py — see CLAUDE.md "Test layout
      # rules") + the XDG isolation fixtures in tests/conftest.py let us
      # run the entire suite in one command without the previous
      # "isolation issues" workarounds.
      run: uv run pytest tests/ --tb=short

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: src/srunx/web/frontend/package-lock.json

    - name: Build frontend
      run: |
        cd src/srunx/web/frontend
        npm ci
        npm run build

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
