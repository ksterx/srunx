repos:
  # Ruff (linter + formatter)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff-check
        args: [--fix]
        require_serial: true
      - id: ruff-format
        require_serial: true

  # Pre-commit default hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^src/srunx/web/frontend/dist/
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key

  # uv pip-compile
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.8.22
    hooks:
      - id: pip-compile
        name: pip-compile requirements.in
        args: [requirements.in, -o, requirements.txt]
      - id: pip-compile
        name: pip-compile requirements-dev.in
        args: [requirements-dev.in, -o, requirements-dev.txt]
        files: ^requirements-dev\\.(in|txt)$

  # Backend tests (web module)
  - repo: local
    hooks:
      - id: pytest-web
        name: pytest (web)
        entry: uv run pytest tests/web/ -q --no-header --tb=line
        language: system
        pass_filenames: false
        files: ^(src/srunx/web/|tests/web/)
        types: [python]

  # Frontend TypeScript check
  - repo: local
    hooks:
      - id: tsc-web
        name: tsc (frontend)
        entry: bash -c 'cd src/srunx/web/frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^src/srunx/web/frontend/src/
        types_or: [ts, tsx]

  # Frontend E2E tests (on staged frontend changes)
  - repo: local
    hooks:
      - id: e2e-web
        name: playwright e2e (frontend)
        entry: bash -c 'cd src/srunx/web/frontend && npx vite build --logLevel error && npx playwright test --reporter=line'
        language: system
        pass_filenames: false
        files: ^src/srunx/web/frontend/
        stages: [pre-push]

  # MyPy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-PyYAML
          - pydantic>=2.11.5
          - jinja2>=3.1.6
          - loguru>=0.7.3
          - pyyaml>=6.0.2
          - rich>=14.0.0
          - paramiko>=4.0.0
          - slack-sdk>=3.35.0
          - typer>=0.17.3
          - apscheduler>=3.10.0
          - fastapi>=0.115.0
          - anyio>=4.0.0
